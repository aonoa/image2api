# image2api — one-command stack: PostgreSQL + Redis + RustFS (S3) + backend
# (built from source) + frontend/nginx (HTTP only on port 2000 by default).
#   1) cp .env.docker.example .env
#   2) fill strong POSTGRES_PASSWORD, S3_ACCESS_KEY, and S3_SECRET_KEY
#   3) docker compose --env-file .env up -d --build
# TLS + domain are handled by your own reverse proxy in front of the web
# container. Do not expose production with the example/empty secrets.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vivid_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vivid_ai"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # RustFS — S3-compatible object storage. The backend talks plain S3 (v4-signed)
  # on port 9000. Media is served (cookie-authed) via the backend's /images
  # proxy, so the bucket stays private.
  rustfs:
    image: rustfs/rustfs:latest
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_VOLUMES: /data
    volumes:
      - rustfsdata:/data
    restart: unless-stopped

  # One-shot: wait for RustFS, create the bucket, then exit. mc (the MinIO client)
  # speaks S3 so it works against RustFS too.
  createbucket:
    image: minio/mc:latest
    depends_on:
      - rustfs
    entrypoint: >
      /bin/sh -c "
      until mc alias set s3 http://rustfs:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY}; do
        echo 'waiting for rustfs...'; sleep 2;
      done;
      mc mb -p s3/$${S3_BUCKET} || true;
      echo 'bucket ready';
      "
    environment:
      S3_BUCKET: ${S3_BUCKET:-vivid-ai}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
    restart: "no"

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: production
      APP_TITLE: ${APP_TITLE:-ManyToken}
      HTTP_ADDR: 0.0.0.0:6666
      POSTGRES_DSN: host=postgres user=postgres password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required} dbname=vivid_ai port=5432 sslmode=disable TimeZone=Asia/Shanghai
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_BUCKET: ${S3_BUCKET:-vivid-ai}
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      # Set to the URL your reverse proxy serves the site on (comma-separated).
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:2000}
      # true only if your reverse proxy serves HTTPS; false for plain HTTP.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    volumes:
      - generated:/app/data/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6666/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: ./frontend
    # nginx serves the SPA + proxies the API on container port 2000 (HTTP only).
    # Point your own reverse proxy at host:2000.
    ports:
      - "${WEB_PORT:-2000}:2000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  rustfsdata:
  generated:
