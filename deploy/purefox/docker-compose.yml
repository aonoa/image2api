version: "2.4"

services:
  postgres:
    image: postgres:16-alpine
    container_name: image2api-postgres
    environment:
      POSTGRES_DB: vivid_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ${DATA_DIR:-../data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vivid_ai"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    container_name: image2api-redis
    volumes:
      - ${DATA_DIR:-../data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    container_name: image2api-rustfs
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_VOLUMES: /data
    volumes:
      - ${DATA_DIR:-../data}/rustfs:/data
    restart: unless-stopped

  createbucket:
    image: minio/mc:latest
    container_name: image2api-createbucket
    depends_on:
      - rustfs
    entrypoint: >
      /bin/sh -c "
      until mc alias set s3 http://rustfs:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY}; do
        echo 'waiting for rustfs...'; sleep 2;
      done;
      mc mb -p s3/$${S3_BUCKET} || true;
      echo 'bucket ready';
      "
    environment:
      S3_BUCKET: ${S3_BUCKET:-image2api}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
    restart: "no"

  backend:
    build:
      context: ${APP_DIR:-../app}/backend
    image: image2api-backend:local
    container_name: image2api-backend
    environment:
      APP_ENV: production
      APP_TITLE: ${APP_TITLE:-ManyToken}
      HTTP_ADDR: 0.0.0.0:6666
      POSTGRES_DSN: host=postgres user=postgres password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required} dbname=vivid_ai port=5432 sslmode=disable TimeZone=Asia/Shanghai
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-image2api_session}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://img.purefox.org}
      GENERATED_ROOT: /app/data/generated
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_BUCKET: ${S3_BUCKET:-image2api}
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
    volumes:
      - ${DATA_DIR:-../data}/generated:/app/data/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:6666/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  web:
    build:
      context: ${APP_DIR:-../app}
      dockerfile: ${FRONTEND_DOCKERFILE:-../deploy/frontend.Dockerfile}
    image: image2api-web:local
    container_name: image2api-web
    environment:
      DOMAIN: ${DOMAIN:-img.purefox.org}
      NGINX_ENVSUBST_FILTER: DOMAIN
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-18087}:80"
    volumes:
      - ./frontend-http.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped
